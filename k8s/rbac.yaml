# OCTALUM-PULSE Kubernetes RBAC
# ServiceAccount, Role, and RoleBinding for pulse
#
# SPDX-License-Identifier: MIT
# Copyright (c) 2025 Harery

apiVersion: v1
kind: ServiceAccount
metadata:
  name: pulse
  namespace: pulse
  labels:
    app.kubernetes.io/name: pulse
    app.kubernetes.io/component: system-maintenance
    app.kubernetes.io/part-of: pulse
    app.kubernetes.io/managed-by: kubectl

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pulse
  namespace: pulse
  labels:
    app.kubernetes.io/name: pulse
    app.kubernetes.io/component: system-maintenance
    app.kubernetes.io/part-of: pulse
rules:
  # Allow reading pods and jobs in pulse namespace
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pulse
  namespace: pulse
  labels:
    app.kubernetes.io/name: pulse
    app.kubernetes.io/component: system-maintenance
    app.kubernetes.io/part-of: pulse
subjects:
  - kind: ServiceAccount
    name: pulse
    namespace: pulse
roleRef:
  kind: Role
  name: pulse
  apiGroup: rbac.authorization.k8s.io

---
# ClusterRole for privileged operations
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pulse-privileged
  labels:
    app.kubernetes.io/name: pulse
    app.kubernetes.io/component: system-maintenance
    app.kubernetes.io/part-of: pulse
rules:
  # Allow listing nodes for cluster-wide operations
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pulse-privileged
  labels:
    app.kubernetes.io/name: pulse
    app.kubernetes.io/component: system-maintenance
    app.kubernetes.io/part-of: pulse
subjects:
  - kind: ServiceAccount
    name: pulse
    namespace: pulse
roleRef:
  kind: ClusterRole
  name: pulse-privileged
  apiGroup: rbac.authorization.k8s.io
