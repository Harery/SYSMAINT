# OCTALUM-PULSE Kubernetes DaemonSet
# Runs pulse on every node in the cluster
# Use with caution - this will run maintenance on ALL nodes
#
# SPDX-License-Identifier: MIT
# Copyright (c) 2025 Harery

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: pulse
  namespace: pulse
  labels:
    app.kubernetes.io/name: pulse
    app.kubernetes.io/component: system-maintenance
    app.kubernetes.io/part-of: pulse
    app.kubernetes.io/managed-by: kubectl
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: pulse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pulse
        app.kubernetes.io/component: system-maintenance
    spec:
      serviceAccountName: pulse
      restartPolicy: Always
      hostPID: true
      tolerations:
      # Allow running on master nodes (use with caution)
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      # Allow running on tainted nodes
      - operator: Exists
      containers:
      - name: pulse
        image: ghcr.io/harery/pulse:latest
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh"]
        args: ["-c", "sleep infinity"]  # Keep alive for on-demand execution
        securityContext:
          privileged: true
        env:
        - name: OCTALUM-PULSE_LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: pulse-config
              key: OCTALUM-PULSE_LOG_LEVEL
        - name: TZ
          valueFrom:
            configMapKeyRef:
              name: pulse-config
              key: TZ
        volumeMounts:
        - name: host-root
          mountPath: /host
          readOnly: true
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
      volumes:
      - name: host-root
        hostPath:
          path: /
          type: Directory
      nodeSelector:
        kubernetes.io/os: linux
