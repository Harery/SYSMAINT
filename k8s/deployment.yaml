# OCTALUM-PULSE Kubernetes Deployment
# For one-time maintenance runs, use the CronJob instead
#
# SPDX-License-Identifier: MIT
# Copyright (c) 2025 Harery

apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulse
  namespace: pulse
  labels:
    app.kubernetes.io/name: pulse
    app.kubernetes.io/component: system-maintenance
    app.kubernetes.io/part-of: pulse
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pulse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pulse
        app.kubernetes.io/component: system-maintenance
        app.kubernetes.io/part-of: pulse
    spec:
      restartPolicy: Always
      hostPID: true  # Required for system-level operations
      containers:
      - name: pulse
        image: ghcr.io/harery/pulse:latest
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh"]
        args: ["-c", "sleep 3600"]  # Keep alive for debugging
        securityContext:
          privileged: true  # Required for system maintenance
        env:
        - name: OCTALUM-PULSE_LOG_LEVEL
          value: "info"
        - name: OCTALUM-PULSE_VERSION
          value: "1.0.0"
        - name: TZ
          value: "UTC"
        volumeMounts:
        - name: host-root
          mountPath: /host
          readOnly: true
        - name: host-var-log
          mountPath: /var/log/host
          readOnly: true
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: host-root
        hostPath:
          path: /
          type: Directory
      - name: host-var-log
        hostPath:
          path: /var/log
          type: Directory
      nodeSelector:
        kubernetes.io/os: linux
