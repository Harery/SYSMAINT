apiVersion: v1
kind: Service
metadata:
  name: pulse
  namespace: pulse
  labels:
    app.kubernetes.io/name: pulse
    app.kubernetes.io/component: system-maintenance
    app.kubernetes.io/part-of: pulse
    app.kubernetes.io/managed-by: kubectl
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pulse
  ports:
  - name: metrics
    port: 8080
    targetPort: 8080
    protocol: TCP
