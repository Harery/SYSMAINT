apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: pulse-agent
  namespace: pulse
  labels:
    app.kubernetes.io/name: pulse
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: pulse
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pulse
        app.kubernetes.io/component: agent
    spec:
      serviceAccountName: pulse
      hostPID: true
      containers:
        - name: pulse-agent
          image: ghcr.io/harery/octalum-pulse:latest
          imagePullPolicy: Always
          securityContext:
            privileged: true
          env:
            - name: PULSE_MODE
              value: "agent"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: host-root
              mountPath: /host
              readOnly: true
            - name: pulse-data
              mountPath: /var/lib/pulse
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: host-root
          hostPath:
            path: /
        - name: pulse-data
          hostPath:
            path: /var/lib/pulse
            type: DirectoryOrCreate
