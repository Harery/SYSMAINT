apiVersion: v1
kind: ServiceAccount
metadata:
  name: pulse
  namespace: pulse
  labels:
    app.kubernetes.io/name: pulse
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pulse
  labels:
    app.kubernetes.io/name: pulse
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pulse
  labels:
    app.kubernetes.io/name: pulse
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pulse
subjects:
  - kind: ServiceAccount
    name: pulse
    namespace: pulse
