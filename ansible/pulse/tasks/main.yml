---
- name: Gather package facts
  package_facts:
    manager: auto
  tags: always

- name: Check if pulse is installed
  stat:
    path: "{{ pulse_install_dir }}/pulse"
  register: pulse_binary
  tags: install

- name: Install pulse binary
  block:
    - name: Download pulse binary
      get_url:
        url: "https://github.com/Harery/OCTALUM-PULSE/releases/download/{{ pulse_version }}/pulse-{{ pulse_version }}-{{ ansible_system | lower }}-{{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}"
        dest: /tmp/pulse
        mode: '0755'
      when: not pulse_binary.stat.exists or pulse_version == 'latest'

    - name: Install pulse
      copy:
        src: /tmp/pulse
        dest: "{{ pulse_install_dir }}/pulse"
        mode: '0755'
        remote_src: true
      when: not pulse_binary.stat.exists
  tags: install

- name: Create pulse configuration directory
  file:
    path: "{{ pulse_config_dir }}"
    state: directory
    mode: '0755'
  tags: config

- name: Create pulse log directory
  file:
    path: "{{ pulse_log_dir }}"
    state: directory
    mode: '0755'
  tags: config

- name: Create pulse data directory
  file:
    path: "{{ pulse_data_dir }}"
    state: directory
    mode: '0755'
  tags: config

- name: Deploy pulse configuration
  template:
    src: config.yaml.j2
    dest: "{{ pulse_config_dir }}/config.yaml"
    mode: '0644'
  notify: restart pulse
  tags: config

- name: Install systemd service
  template:
    src: pulse.service.j2
    dest: /etc/systemd/system/pulse.service
    mode: '0644'
  when: ansible_service_mgr == 'systemd'
  notify: reload systemd
  tags: systemd

- name: Install systemd timer
  template:
    src: pulse.timer.j2
    dest: /etc/systemd/system/pulse.timer
    mode: '0644'
  when: ansible_service_mgr == 'systemd' and pulse_schedule_enabled
  notify: reload systemd
  tags: systemd

- name: Enable and start pulse timer
  systemd:
    name: pulse.timer
    enabled: true
    state: started
    daemon_reload: true
  when: ansible_service_mgr == 'systemd' and pulse_schedule_enabled
  tags: systemd

- name: Verify installation
  command: "{{ pulse_install_dir }}/pulse version"
  register: pulse_version_output
  changed_when: false
  tags: verify

- name: Display version
  debug:
    msg: "{{ pulse_version_output.stdout }}"
  tags: verify
