name: terraform-provider-pulse

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]
    paths:
      - 'contrib/terraform-provider-pulse/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contrib/terraform-provider-pulse
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      
      - name: Build
        run: go build -v ./...
      
      - name: Test
        run: go test -v ./...
      
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
      
      - name: Terraform Format Check
        run: terraform fmt -check -recursive examples/
