name: Bug Report
description: Report a bug to help us improve OCTALUM-PULSE
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! 
        Please fill out the sections below to help us diagnose the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is
      placeholder: "When I run pulse update, it fails with..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Run `pulse update --smart`
        2. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Please paste any relevant log output
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Please run `pulse version` and paste the output
      render: shell
      placeholder: |
        Version: v2.0.0
        Platform: linux/amd64
        Distribution: ubuntu/24.04
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched the existing issues
          required: true
        - label: I have tried with the latest version
          required: false
        - label: I can reproduce this consistently
          required: false
