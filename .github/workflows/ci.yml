name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test-ubuntu:
    name: Test on Ubuntu (Debian Family)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck jq
          python -m pip install --upgrade pip
          pip install jsonschema

      - name: ShellCheck (sysmaint and libs)
        run: |
          shellcheck -x -S error sysmaint
          shellcheck -x -S error lib/*.sh
          shellcheck -x scripts/*.sh || true
          # Completions and packaging are not strictly POSIX; ignore failures
          # Using -S error to only fail on actual errors, not info/style

      - name: Make scripts executable
        run: |
          chmod +x sysmaint
          chmod +x tests/*.sh
          chmod +x scripts/*.sh

      - name: Run test suites
        env:
          DRY_RUN: "true"
          JSON_SUMMARY: "true"
        run: |
          set -x
          echo "Starting test suite execution..."
          bash tests/test_suite_smoke.sh || { echo "❌ Smoke tests failed"; exit 1; }
          echo "✓ Smoke tests passed"
          bash tests/test_suite_edge.sh || { echo "❌ Edge tests failed"; exit 1; }
          echo "✓ Edge tests passed"
          bash tests/test_suite_security.sh || { echo "❌ Security tests failed"; exit 1; }
          echo "✓ Security tests passed"
          bash tests/test_suite_compliance.sh || { echo "❌ Compliance tests failed"; exit 1; }
          echo "✓ Compliance tests passed"
          bash tests/test_suite_governance.sh || { echo "❌ Governance tests failed"; exit 1; }
          echo "✓ Governance tests passed"
          bash tests/test_suite_performance.sh || { echo "❌ Performance tests failed"; exit 1; }
          echo "✓ Performance tests passed"
          bash tests/test_json_validation.sh || { echo "❌ JSON validation failed"; exit 1; }
          echo "✅ All tests passed!"

  test-fedora:
    if: false  # Temporarily disabled
    name: Test on Fedora 43 (Red Hat Family)
    runs-on: ubuntu-latest
    container:
      image: fedora:43
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y bash jq python3 python3-pip
          # ShellCheck is available in Fedora repos
          dnf install -y ShellCheck || echo "ShellCheck not available, skipping"
          python3 -m pip install --upgrade pip
          pip3 install jsonschema

      - name: ShellCheck (sysmaint and libs)
        continue-on-error: true
        run: |
          if command -v shellcheck &> /dev/null; then
            shellcheck -x -S error sysmaint || echo "ShellCheck found issues but continuing"
            shellcheck -x -S error lib/*.sh || echo "ShellCheck found issues in libs but continuing"
            shellcheck -x scripts/*.sh || true
          else
            echo "ShellCheck not available, skipping linting"
          fi

      - name: Make scripts executable
        run: |
          chmod +x sysmaint
          chmod +x tests/*.sh
          chmod +x scripts/*.sh

      - name: Run test suites
        env:
          DRY_RUN: "true"
          JSON_SUMMARY: "true"
        run: |
          set -x
          echo "Starting test suite execution..."
          bash tests/test_suite_smoke.sh || { echo "❌ Smoke tests failed"; exit 1; }
          echo "✓ Smoke tests passed"
          bash tests/test_suite_edge.sh || { echo "❌ Edge tests failed"; exit 1; }
          echo "✓ Edge tests passed"
          bash tests/test_suite_security.sh || { echo "❌ Security tests failed"; exit 1; }
          echo "✓ Security tests passed"
          bash tests/test_suite_compliance.sh || { echo "❌ Compliance tests failed"; exit 1; }
          echo "✓ Compliance tests passed"
          bash tests/test_suite_governance.sh || { echo "❌ Governance tests failed"; exit 1; }
          echo "✓ Governance tests passed"
          bash tests/test_suite_performance.sh || { echo "❌ Performance tests failed"; exit 1; }
          echo "✓ Performance tests passed"
          bash tests/test_json_validation.sh || { echo "❌ JSON validation failed"; exit 1; }
          echo "✅ All tests passed!"

  test-centos:
    if: false  # Temporarily disabled
    name: Test on CentOS Stream 10 (Red Hat Family)
    runs-on: ubuntu-latest
    container:
      image: quay.io/centos/centos:stream10
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y bash jq python3 python3-pip
          # Try to install EPEL for ShellCheck
          dnf install -y epel-release || true
          dnf install -y ShellCheck || echo "ShellCheck not available, skipping"
          python3 -m pip install --upgrade pip
          pip3 install jsonschema

      - name: ShellCheck (sysmaint and libs)
        continue-on-error: true
        run: |
          if command -v shellcheck &> /dev/null; then
            shellcheck -x -S error sysmaint || echo "ShellCheck found issues but continuing"
            shellcheck -x -S error lib/*.sh || echo "ShellCheck found issues in libs but continuing"
            shellcheck -x scripts/*.sh || true
          else
            echo "ShellCheck not available, skipping linting"
          fi

      - name: Make scripts executable
        run: |
          chmod +x sysmaint
          chmod +x tests/*.sh
          chmod +x scripts/*.sh

      - name: Run test suites
        env:
          DRY_RUN: "true"
          JSON_SUMMARY: "true"
        run: |
          set -x
          echo "Starting test suite execution..."
          bash tests/test_suite_smoke.sh || { echo "❌ Smoke tests failed"; exit 1; }
          echo "✓ Smoke tests passed"
          bash tests/test_suite_edge.sh || { echo "❌ Edge tests failed"; exit 1; }
          echo "✓ Edge tests passed"
          bash tests/test_suite_security.sh || { echo "❌ Security tests failed"; exit 1; }
          echo "✓ Security tests passed"
          bash tests/test_suite_compliance.sh || { echo "❌ Compliance tests failed"; exit 1; }
          echo "✓ Compliance tests passed"
          bash tests/test_suite_governance.sh || { echo "❌ Governance tests failed"; exit 1; }
          echo "✓ Governance tests passed"
          bash tests/test_suite_performance.sh || { echo "❌ Performance tests failed"; exit 1; }
          echo "✓ Performance tests passed"
          bash tests/test_suite_json_validation.sh || { echo "❌ JSON validation failed"; exit 1; }
          echo "✅ All tests passed!"

  test-rhel:
    if: false  # Temporarily disabled
    name: Test on RHEL 10 (Red Hat Family)
    runs-on: ubuntu-latest
    container:
      image: registry.access.redhat.com/ubi10/ubi:latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y bash jq python3 python3-pip
          # ShellCheck not available in UBI repos without subscription
          dnf install -y ShellCheck || echo "ShellCheck not available in UBI, skipping"
          python3 -m pip install --upgrade pip
          pip3 install jsonschema

      - name: ShellCheck (sysmaint and libs)
        continue-on-error: true
        run: |
