name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck jq
          python -m pip install --upgrade pip
          pip install jsonschema

      - name: ShellCheck (sysmaint and libs)
        run: |
          shellcheck -x -S error sysmaint
          shellcheck -x -S error lib/*.sh
          shellcheck -x scripts/*.sh || true
          # Completions and packaging are not strictly POSIX; ignore failures
          # Using -S error to only fail on actual errors, not info/style

      - name: Make scripts executable
        run: |
          chmod +x sysmaint
          chmod +x tests/*.sh
          chmod +x scripts/*.sh
      - name: Debug environment
        run: |
          echo "=== Disk Space ==="
          df -h
          echo ""
          echo "=== OS Info ==="
          cat /etc/os-release
          echo ""
          echo "=== Test single script run ==="
          DRY_RUN=true JSON_SUMMARY=true bash ./sysmaint 2>&1 | tail -20 || echo "Exit code: $?"
          echo ""
          echo "=== Check JSON files ==="
          ls -lah /tmp/system-maintenance/ 2>/dev/null || echo "No JSON files found"


      - name: Run test suites
        env:
          DRY_RUN: "true"
          JSON_SUMMARY: "true"
        run: |
          bash tests/test_suite_smoke.sh
          bash tests/test_suite_edge.sh
          bash tests/test_suite_security.sh
          bash tests/test_suite_compliance.sh
          bash tests/test_suite_governance.sh
          bash tests/test_suite_performance.sh
          bash tests/test_json_validation.sh
