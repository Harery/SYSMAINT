name: sysmaint dry-run matrix

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  dry-run:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        flags:
          - ""
          - "--upgrade"
          - "--color=never --check-zombies --security-audit"
          - "--browser-cache-report"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bash syntax check
        run: bash -n sysmaint

      - name: Shellcheck
        run: shellcheck -S warning sysmaint || true

      - name: Run sysmaint dry-run ${{ matrix.flags }}
        env:
          DRY_RUN: "true"
          JSON_SUMMARY: "true"
          CHECK_ZOMBIES: "true"
          SECURITY_AUDIT_ENABLED: "true"
        run: |
          bash sysmaint ${{ matrix.flags }} || true
          echo '--- JSON summary (if any) ---'
          JSON_FILE=$(ls -1t /tmp/system-maintenance/sysmaint_*.json 2>/dev/null | head -n1 || true)
          if [ -n "$JSON_FILE" ] && [ -f "$JSON_FILE" ]; then
            echo "Using $JSON_FILE"
            jq '.' "$JSON_FILE" || cat "$JSON_FILE"
          else
            echo "No JSON found in /tmp/system-maintenance/."
          fi

      - name: Validate JSON against schema
        run: |
          pipx install jsonschema || pip install --user jsonschema || python3 -m pip install --user jsonschema || true
          chmod +x tests/validate_json.py tests/test_json_validation.sh || true
          bash tests/test_json_validation.sh

      - name: Ensure script parses help
        run: |
          bash sysmaint --help | head -n 40

      - name: Run smoke regression suite
        run: |
          chmod +x tests/test_suite_smoke.sh
          bash tests/test_suite_smoke.sh

      - name: Run edge parser suite
        run: |
          chmod +x tests/test_suite_edge.sh
          bash tests/test_suite_edge.sh

      - name: Run sandbox real-mode suite
        run: |
          chmod +x tests/test_suite_realmode_sandbox.sh
          bash tests/test_suite_realmode_sandbox.sh

      - name: Run checksum integrity test
        run: |
          chmod +x tests/test_json_checksum.sh || true
          bash tests/test_json_checksum.sh

      - name: Generate coverage matrix
        run: |
          chmod +x scripts/generate_coverage_matrix.sh
          bash scripts/generate_coverage_matrix.sh coverage-matrix.json
          cat coverage-matrix.json

      - name: Upload coverage matrix artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage-matrix
          path: coverage-matrix.json

  feature-combos:
    runs-on: ubuntu-latest
    needs: dry-run
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare validators
        run: |
          pipx install jsonschema || pip install --user jsonschema || python3 -m pip install --user jsonschema || true
          chmod +x tests/validate_json.py tests/test_json_validation.sh || true

      - name: Ensure executable bits
        run: |
          chmod +x sysmaint tests/test_suite_combos.sh || true

      - name: Bash syntax check
        run: bash -n sysmaint

      - name: Run feature combinations suite
        env:
          DRY_RUN: "true"
          JSON_SUMMARY: "true"
        run: |
          bash tests/test_suite_combos.sh

  package-build:
    runs-on: ubuntu-latest
    needs: feature-combos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packaging toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper devscripts lintian rsync

      - name: Build Debian package
        run: |
          chmod +x tests/test_package_build.sh
          bash tests/test_package_build.sh
