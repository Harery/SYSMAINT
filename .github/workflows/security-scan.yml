name: Security Scanning

on:
  schedule:
    # Run weekly on Sunday at 02:00 UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'sysmaint'
      - 'sysmaint_scanners.sh'
      - '.github/workflows/security-scan.yml'

jobs:
  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install security scanners
        run: |
          sudo apt-get update
          sudo apt-get install -y lynis rkhunter
          
      - name: Update rkhunter database
        run: |
          sudo rkhunter --update || true
          sudo rkhunter --propupd || true

      - name: Run scanner orchestrator
        id: scan
        continue-on-error: true
        env:
          LYNIS_MIN_SCORE: 70
          RKHUNTER_MAX_WARNINGS: 10
          RETENTION_DAYS: 7
        run: |
          bash sysmaint_scanners.sh

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: |
            scanner_artifacts/summary_*.json
            scanner_artifacts/lynis_*.log
            scanner_artifacts/rkhunter_*.log
          retention-days: 90

      - name: Check scan results
        if: always()
        run: |
          if [[ -f scanner_artifacts/summary_*.json ]]; then
            echo "Latest scan summary:"
            cat scanner_artifacts/summary_*.json | head -20
          fi
          
          # Exit with scanner's exit code
          exit ${{ steps.scan.outcome == 'success' && 0 || 1 }}

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summaryFiles = fs.readdirSync('scanner_artifacts')
              .filter(f => f.startsWith('summary_'))
              .sort()
              .reverse();
            
            if (summaryFiles.length === 0) {
              console.log('No summary files found');
              return;
            }
            
            const summary = JSON.parse(fs.readFileSync(`scanner_artifacts/${summaryFiles[0]}`, 'utf8'));
            
            let comment = '## 🔒 Security Scan Results\n\n';
            comment += `**Timestamp:** ${summary.timestamp}\n\n`;
            
            if (summary.lynis_invoked) {
              comment += `### Lynis\n`;
              comment += `- **Score:** ${summary.lynis_score || 'N/A'}\n`;
              comment += `- **Threshold:** ${process.env.LYNIS_MIN_SCORE || 80}\n\n`;
            }
            
            if (summary.rkhunter_invoked) {
              comment += `### RKHunter\n`;
              comment += `- **Warnings:** ${summary.rkhunter_warnings || 0}\n`;
              comment += `- **Rootkit References:** ${summary.rkhunter_rootkit_refs || 0}\n\n`;
            }
            
            comment += `\n📊 Full artifacts available in workflow run.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
