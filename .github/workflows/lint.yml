name: Lint Shell Scripts

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install shellcheck & shfmt
        run: |
          sudo apt-get update -y
          sudo apt-get install -y shellcheck
          curl -sSL https://github.com/mvdan/sh/releases/latest/download/shfmt_v3.7.0_linux_amd64 -o shfmt
          chmod +x shfmt
          sudo mv shfmt /usr/local/bin/shfmt
      - name: Run shellcheck
        continue-on-error: true
        run: |
          # Run shellcheck but don't fail the job on issues
          shellcheck -x -S error sysmaint || echo "ShellCheck found issues in sysmaint"
          shellcheck -x -S error $(git ls-files 'lib/*.sh') || echo "ShellCheck found issues in lib files"
          shellcheck -x $(git ls-files 'tests/*.sh' 'scripts/*.sh') || echo "ShellCheck found issues in tests/scripts"
      - name: Run shfmt diff
        continue-on-error: true
        run: |
          # Check formatting but don't fail the job
          shfmt -d $(git ls-files '*.sh') || echo "shfmt found formatting issues"