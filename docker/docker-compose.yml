version: "3.8"

services:
  # OCTALUM-PULSE - One-time execution
  pulse:
    image: ghcr.io/harery/pulse:latest
    container_name: pulse
    privileged: true
    restart: "no"  # Run once and exit
    volumes:
      # Mount host root filesystem (read-only for safety)
      - /:/host:ro
    environment:
      - OCTALUM-PULSE_LOG_LEVEL=info
      - OCTALUM-PULSE_VERSION=1.0.0
    networks:
      - maintenance
    labels:
      - "com.pulse.description=Enterprise Linux System Maintenance"
      - "com.pulse.version=1.0.0"

  # OCTALUM-PULSE - Scheduled (for daemon mode)
  # Uncomment to use as a persistent service
  # pulse-scheduled:
  #   image: ghcr.io/harery/pulse:latest
  #   container_name: pulse-scheduled
  #   privileged: true
  #   restart: unless-stopped
  #   volumes:
  #     - /:/host:ro
  #     - ./logs:/var/log/pulse
  #     - ./config:/etc/pulse:ro
  #   environment:
  #     - OCTALUM-PULSE_LOG_LEVEL=info
  #     - TZ=UTC
  #   networks:
  #     - maintenance

  # OCTALUM-PULSE - with PostgreSQL (example integration)
  # Uncomment this section if you want to integrate with database maintenance
  # pulse-with-db:
  #   image: ghcr.io/harery/pulse:latest
  #   container_name: pulse-with-db
  #   privileged: true
  #   restart: "no"
  #   depends_on:
  #     - postgres
  #   volumes:
  #     - /:/host:ro
  #   environment:
  #     - DB_HOST=postgres
  #     - DB_PORT=5432
  #     - DB_NAME=maintenance_db
  #   networks:
  #     - maintenance
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: postgres-maintenance
  #   restart: always
  #   environment:
  #     - POSTGRES_DB=maintenance_db
  #     - POSTGRES_USER=pulse
  #     - POSTGRES_PASSWORD=changeme
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - maintenance

networks:
  maintenance:
    driver: bridge
    labels:
      - "com.pulse.network=Maintenance Network"

# Uncomment for persistent database storage
# volumes:
#   postgres-data:
#     driver: local
