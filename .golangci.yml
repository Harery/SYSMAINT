version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - misspell
    - revive
    - gocyclo
    - dupl
    - goconst
    - gocritic
    - prealloc
    - bodyclose
    - noctx
    - sqlclosecheck
    - tparallel
    - ineffassign

  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false

    govet:
      disable:
        - shadow

    gocyclo:
      min-complexity: 20

    dupl:
      threshold: 150

    goconst:
      min-len: 5
      min-occurrences: 4

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint
        - wrapperFunc
        - hugeParam
        - rangeValCopy

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - dupl
          - goconst
          - gocyclo
      - path: test/mocks/
        linters:
          - unused
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
